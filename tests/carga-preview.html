<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carga 2.0 — Preview</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --brand-700: #08a95d;
      --brand-900: #0d2b1a;
      --bg: #f7f5ef;
      --ink: #1d231f;
      --muted: #5d645b;
      --surface-primary: #ffffff;
      --surface-secondary: #f0ede4;
      --line-default: #ccd0bf;
      --line-subtle: #e4e1d6;
      --person-risk-overloaded-strong: #a84d57;
      --person-risk-overloaded-soft: #f7e9eb;
      --person-risk-overloaded-chip-bg: #fbeff1;
      --person-risk-overloaded-chip-border: #e7c9ce;
      --person-risk-at-limit-strong: #7e6f40;
      --person-risk-at-limit-soft: #f4efdf;
      --person-risk-at-limit-chip-bg: #faf5e4;
      --person-risk-at-limit-chip-border: #ddd0a1;
      --person-risk-optimal-strong: #2d6c3e;
      --person-risk-optimal-soft: #edf7f0;
      --person-risk-optimal-chip-bg: #f0f9f2;
      --person-risk-underloaded-strong: #7a7567;
      --person-risk-underloaded-soft: #f3f0e8;
      --person-work-done: #476c9b;
      --person-work-live: #0f8c76;
      --person-work-todo: #c38c47;
      --person-work-free: #d9ddd2;
      --workload-bg: #f7f5ef;
      --workload-surface: #ffffff;
      --workload-surface-muted: #f3f0e6;
      --workload-border: #ddd8ca;
      --workload-border-soft: #ebe7dc;
      --workload-text: #1f2937;
      --workload-text-muted: #69707d;
      --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--ink); padding: 32px; }

    /* ── Breadcrumb & title ── */
    .page-breadcrumb { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; }
    .page-breadcrumb span { opacity: 0.6; margin: 0 4px; }
    .page-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em; color: var(--ink); margin-bottom: 20px; }

    /* ── Control shell ── */
    .workload-control-shell {
      display: grid;
      gap: 0;
      padding: 10px 12px;
      border: 1px solid var(--workload-border);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(250,248,242,0.96) 100%);
      box-shadow: 0 8px 20px rgba(26,28,31,0.04);
      margin-bottom: 14px;
    }
    .workload-control-main {
      display: grid;
      grid-template-columns: auto minmax(260px, 1fr) 150px auto;
      align-items: center;
      gap: 10px;
    }
    .workload-mode-switch {
      height: 40px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--workload-border);
      border-radius: 12px;
      background: var(--workload-surface-muted);
    }
    .workload-mode-option {
      height: 100%;
      min-width: 90px;
      padding: 0 16px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: var(--workload-text-muted);
      font-size: 0.84rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 140ms ease, color 140ms ease;
    }
    .workload-mode-option.is-active {
      background: var(--brand-700);
      color: #fff;
    }
    .person-control-input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--workload-border);
      border-radius: 10px;
      background: var(--workload-surface);
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--workload-text);
      cursor: pointer;
    }
    .person-toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 40px;
      padding: 0 14px;
      border: 1px solid var(--workload-border);
      border-radius: 11px;
      background: var(--workload-surface);
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--workload-text);
      cursor: pointer;
    }
    .person-toolbar-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--brand-700);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 800;
    }

    /* ── Stats strip ── */
    .carga-stats-strip {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      row-gap: 4px;
      padding: 6px 14px 10px;
      font-size: 0.76rem;
      color: var(--workload-text-muted);
      border-top: 1px solid var(--workload-border-soft);
      margin-top: 6px;
    }
    .carga-stats-sep { margin: 0 9px; opacity: 0.4; font-size: 0.9rem; user-select: none; }
    .carga-stats-item { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
    .carga-stats-num { font-weight: 700; color: var(--workload-text); }
    .carga-stats-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .carga-stats-badge--done { background: rgba(71,108,155,0.1); color: var(--person-work-done); }
    .carga-stats-badge--alert { background: rgba(168,77,87,0.1); color: var(--person-risk-overloaded-strong); }
    .carga-stats-badge--warn { background: rgba(195,140,71,0.1); color: var(--person-risk-at-limit-strong); }

    /* ── Team health bar ── */
    .carga-team-bar {
      height: 3px;
      border-radius: 2px;
      background: var(--workload-border-soft);
      margin: 0 2px 18px;
      overflow: hidden;
    }
    .carga-team-bar-fill {
      height: 100%;
      width: var(--bar-w, 0%);
      border-radius: 2px;
      background: linear-gradient(90deg, var(--person-work-done) 0%, var(--person-work-live) 100%);
      transform-origin: left center;
      animation: carga-team-bar-in 1.1s cubic-bezier(0.4,0,0.2,1) both;
      animation-delay: 80ms;
    }

    /* ── List header ── */
    .person-list-header { padding: 2px 20px 10px; margin-bottom: 4px; border-bottom: 1px solid var(--workload-border-soft); }
    .person-list-header-inner {
      display: grid;
      grid-template-columns: minmax(210px,1.4fr) 110px minmax(280px,2fr) 100px 32px;
      gap: 16px;
      align-items: center;
    }
    .person-list-header-cell {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--workload-text-muted);
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
    }
    .person-list-header-cell.is-active { color: var(--workload-text); }

    /* ── Person lane ── */
    .person-lane {
      margin-bottom: 6px;
      border: 1px solid var(--workload-border-soft);
      border-left: 4px solid transparent;
      border-radius: 16px;
      background: var(--workload-surface);
      box-shadow: 0 6px 18px rgba(26,28,31,0.035);
      overflow: hidden;
      animation: carga-lane-in 0.38s ease both;
      animation-delay: calc(var(--lane-idx,0) * 38ms + 80ms);
      transition: box-shadow 0.22s ease, transform 0.18s ease;
    }
    .person-lane:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(26,28,31,0.08); }
    .person-lane--overloaded { border-left-color: var(--person-risk-overloaded-strong); }
    .person-lane--at-limit { border-left-color: var(--person-risk-at-limit-strong); }
    .person-lane--optimal { border-left-color: var(--person-work-done); }
    .person-lane--underloaded { border-left-color: #8da37d; }
    .person-lane--unassigned { border-left-color: #b77445 !important; background: #fdfaf6; }

    .person-swimlane-toggle {
      display: block;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      padding: 0;
    }
    .person-status-strip {
      display: grid;
      grid-template-columns: minmax(210px,1.4fr) 110px minmax(280px,2fr) 100px 32px;
      gap: 16px;
      padding: 14px 18px;
      min-height: 70px;
      align-items: center;
    }

    /* Identity */
    .person-status-identity { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .plc-avatar-zone { position: relative; flex-shrink: 0; }
    .person-avatar {
      display: block; width: 38px; height: 38px;
      border-radius: 50%; object-fit: cover;
      border: 2.5px solid var(--workload-border);
      box-sizing: border-box;
    }
    .person-avatar--placeholder {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--workload-surface-muted);
      border: 2.5px solid var(--workload-border);
      display: flex; align-items: center; justify-content: center;
      color: var(--workload-text-muted); font-size: 1rem;
    }
    .plc-status-dot {
      position: absolute; bottom: -1px; right: -1px;
      width: 10px; height: 10px; border-radius: 50%;
      border: 1.5px solid #fff;
    }
    .plc-status-dot--overloaded { background: var(--person-risk-overloaded-strong); }
    .plc-status-dot--at-limit { background: var(--person-risk-at-limit-strong); }
    .plc-status-dot--optimal { background: var(--person-work-done); }
    .plc-status-dot--underloaded { background: #9aa89a; }
    .person-workload-identity { min-width: 0; }
    .plc-name { font-size: 0.9rem; font-weight: 700; color: var(--workload-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .plc-name.italic { font-style: italic; }
    .plc-sub { font-size: 0.74rem; color: var(--workload-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

    /* Avatar ring */
    .carga-avatar-ring--overloaded .person-avatar { border-color: var(--person-risk-overloaded-strong) !important; --pulse-clr: rgba(168,77,87,0.3); animation: carga-pulse-ring 2s ease-in-out infinite; }
    .carga-avatar-ring--at-limit .person-avatar { border-color: var(--person-risk-at-limit-strong) !important; --pulse-clr: rgba(180,130,50,0.28); animation: carga-pulse-ring 2.6s ease-in-out infinite; }
    .carga-avatar-ring--optimal .person-avatar { border-color: var(--person-work-done) !important; }
    .carga-avatar-ring--underloaded .person-avatar { border-color: var(--workload-border) !important; }

    /* State chip */
    .person-status-capacity { display: flex; align-items: center; }
    .plc-chip {
      display: inline-flex; align-items: center;
      padding: 3px 8px; border-radius: 999px;
      font-size: 0.69rem; font-weight: 700; line-height: 1.4;
      white-space: nowrap; border: 1px solid;
    }
    .person-risk-chip--overloaded { background: var(--person-risk-overloaded-chip-bg); color: var(--person-risk-overloaded-strong); border-color: var(--person-risk-overloaded-chip-border); }
    .person-risk-chip--at-limit { background: var(--person-risk-at-limit-chip-bg); color: var(--person-risk-at-limit-strong); border-color: var(--person-risk-at-limit-chip-border); }
    .person-risk-chip--optimal { background: var(--person-risk-optimal-chip-bg,#f0f9f2); color: var(--person-risk-optimal-strong); border-color: rgba(45,108,62,0.2); }
    .person-risk-chip--underloaded { background: var(--person-risk-underloaded-soft); color: var(--person-risk-underloaded-strong); border-color: rgba(122,117,103,0.2); }
    .person-risk-chip--unassigned { background: rgba(183,116,69,0.1); color: #b77445; border-color: rgba(183,116,69,0.25); }

    /* Inline animated bar */
    .person-status-mix { display: flex; align-items: center; min-width: 0; }
    .carga-bar-track {
      display: flex; height: 7px; border-radius: 5px;
      overflow: hidden; background: var(--workload-border-soft); width: 100%;
    }
    .carga-bar-seg {
      flex-shrink: 0; flex-grow: 0; height: 100%;
      width: var(--bar-w, 0%);
      transform-origin: left center;
      animation: carga-bar-reveal 0.65s cubic-bezier(0.4,0,0.2,1) both;
      animation-delay: var(--bar-delay, 0ms);
    }
    .carga-bar-seg--done { background: var(--person-work-done); border-radius: 5px 0 0 5px; }
    .carga-bar-seg--progress { background: var(--person-work-live); }
    .carga-bar-seg--todo { background: var(--person-work-todo); opacity: 0.65; }
    .carga-bar-seg--free { flex: 1; animation: none; width: auto !important; background: transparent; }

    /* Metric */
    .person-status-signal { display: flex; align-items: center; justify-content: flex-end; }
    .carga-metric-block { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .carga-metric-pts { font-size: 0.95rem; font-weight: 700; line-height: 1; color: var(--workload-text); white-space: nowrap; }
    .carga-metric-pct { font-size: 0.7rem; color: var(--workload-text-muted); font-weight: 600; }
    .person-risk-text--overloaded { color: var(--person-risk-overloaded-strong); }
    .person-risk-text--at-limit { color: var(--person-risk-at-limit-strong); }
    .person-risk-text--optimal { color: var(--person-risk-optimal-strong); }
    .person-risk-text--underloaded { color: var(--workload-text); }

    /* Chevron */
    .plc-chevron { display: flex; align-items: center; justify-content: center; color: var(--workload-text-muted); }
    .chevron-icon { transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); }

    /* Zone divider */
    .person-zone-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 6px 0 10px;
      color: var(--workload-text-muted); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
    }
    .person-zone-divider::before, .person-zone-divider::after { content: ''; flex: 1; height: 1px; background: var(--workload-border-soft); }

    /* ── Keyframes ── */
    @keyframes carga-lane-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes carga-bar-reveal {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
    @keyframes carga-pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 var(--pulse-clr, transparent); }
      50%       { box-shadow: 0 0 0 5px var(--pulse-clr, transparent); }
    }
    @keyframes carga-team-bar-in {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
  </style>
</head>
<body>

<div style="max-width:1140px; margin:0 auto;">

  <!-- Breadcrumb + Title -->
  <p class="page-breadcrumb">Workspace <span>›</span> Operación <span>›</span> Carga</p>
  <h1 class="page-title">Carga</h1>

  <!-- Control shell -->
  <div class="workload-control-shell">
    <div class="workload-control-main">

      <div class="workload-mode-switch" role="tablist">
        <button class="workload-mode-option is-active" role="tab">Actual</button>
        <button class="workload-mode-option" role="tab">Histórico</button>
      </div>

      <select class="person-control-input">
        <option>Todos los sprints activos</option>
        <option>Sprint 19</option>
        <option>Sprint 18</option>
      </select>

      <select class="person-control-input">
        <option>Carga ↓</option>
        <option>Riesgo</option>
        <option>Hecho</option>
        <option>Nombre A–Z</option>
      </select>

      <button class="person-toolbar-btn">
        <i class="fa-solid fa-sliders"></i>
        Filtros
      </button>

    </div>

    <!-- Stats strip -->
    <div class="carga-stats-strip">
      <span class="carga-stats-item">Todos los sprints activos</span>
      <span class="carga-stats-sep">·</span>
      <span class="carga-stats-item"><strong class="carga-stats-num">6</strong> personas</span>
      <span class="carga-stats-sep">·</span>
      <span class="carga-stats-item"><strong class="carga-stats-num">237</strong> tareas</span>
      <span class="carga-stats-sep">·</span>
      <span class="carga-stats-item"><strong class="carga-stats-num">50/240</strong> pts</span>
      <span class="carga-stats-sep">·</span>
      <span class="carga-stats-item"><strong class="carga-stats-num">21%</strong> utilizado</span>
      <span class="carga-stats-sep">·</span>
      <span class="carga-stats-item carga-stats-badge carga-stats-badge--done">
        <i class="fas fa-check"></i>
        <strong class="carga-stats-num">27</strong> pts hecho
      </span>
      <span class="carga-stats-sep">·</span>
      <span class="carga-stats-item carga-stats-badge carga-stats-badge--alert">
        <i class="fas fa-triangle-exclamation"></i>
        1 sobrecargado
      </span>
      <span class="carga-stats-sep">·</span>
      <span class="carga-stats-item carga-stats-badge carga-stats-badge--warn">
        <i class="fas fa-user-slash"></i>
        77 sin dueño
      </span>
    </div>
  </div>

  <!-- Team health bar -->
  <div class="carga-team-bar" role="progressbar" aria-valuenow="21" aria-valuemin="0" aria-valuemax="100">
    <div class="carga-team-bar-fill" style="--bar-w:21%"></div>
  </div>

  <!-- List header -->
  <div class="person-list-header">
    <div class="person-list-header-inner">
      <button class="person-list-header-cell">Persona</button>
      <button class="person-list-header-cell">Estado</button>
      <button class="person-list-header-cell is-active">Trabajo ↓</button>
      <button class="person-list-header-cell">Carga</button>
      <span></span>
    </div>
  </div>

  <!-- Sin Asignar (exception row) -->
  <div class="person-lane person-lane--unassigned" style="--lane-idx:0">
    <button class="person-swimlane-toggle" type="button">
      <div class="person-status-strip">
        <div class="person-status-identity">
          <div class="plc-avatar-zone carga-avatar-ring carga-avatar-ring--underloaded">
            <div class="person-avatar--placeholder"><i class="fas fa-question"></i></div>
            <span class="plc-status-dot plc-status-dot--underloaded"></span>
          </div>
          <div class="person-workload-identity">
            <h3 class="plc-name italic">Sin Asignar</h3>
            <p class="plc-sub">77 tareas sin dueño</p>
          </div>
        </div>
        <div class="person-status-capacity">
          <span class="plc-chip person-risk-chip--unassigned">Atención</span>
        </div>
        <div class="person-status-mix">
          <div class="carga-bar-track">
            <div class="carga-bar-seg carga-bar-seg--todo" style="--bar-w:30%;--bar-delay:120ms"></div>
            <div class="carga-bar-seg carga-bar-seg--free"></div>
          </div>
        </div>
        <div class="person-status-signal">
          <div class="carga-metric-block">
            <span class="carga-metric-pts">10 / 40 pts</span>
            <span class="carga-metric-pct">25%</span>
          </div>
        </div>
        <div class="plc-chevron">
          <i class="fas fa-chevron-down chevron-icon"></i>
        </div>
      </div>
    </button>
  </div>

  <!-- Emilio — at limit (100%) -->
  <div class="person-lane person-lane--at-limit" style="--lane-idx:1">
    <button class="person-swimlane-toggle" type="button">
      <div class="person-status-strip">
        <div class="person-status-identity">
          <div class="plc-avatar-zone carga-avatar-ring carga-avatar-ring--at-limit">
            <img src="https://ui-avatars.com/api/?name=Emilio+Chavez&background=476c9b&color=fff&size=80" class="person-avatar" alt="Emilio Chávez"/>
            <span class="plc-status-dot plc-status-dot--at-limit"></span>
          </div>
          <div class="person-workload-identity">
            <h3 class="plc-name">Emilio Chávez</h3>
            <p class="plc-sub">35 tareas · 60% completado</p>
          </div>
        </div>
        <div class="person-status-capacity">
          <span class="plc-chip person-risk-chip--at-limit">Al límite</span>
        </div>
        <div class="person-status-mix">
          <div class="carga-bar-track">
            <div class="carga-bar-seg carga-bar-seg--done"     style="--bar-w:60%;--bar-delay:158ms"></div>
            <div class="carga-bar-seg carga-bar-seg--progress" style="--bar-w:20%;--bar-delay:228ms"></div>
            <div class="carga-bar-seg carga-bar-seg--todo"     style="--bar-w:20%;--bar-delay:298ms"></div>
            <div class="carga-bar-seg carga-bar-seg--free"></div>
          </div>
        </div>
        <div class="person-status-signal">
          <div class="carga-metric-block">
            <span class="carga-metric-pts person-risk-text--at-limit">40 / 40 pts</span>
            <span class="carga-metric-pct">100%</span>
          </div>
        </div>
        <div class="plc-chevron">
          <i class="fas fa-chevron-down chevron-icon"></i>
        </div>
      </div>
    </button>
  </div>

  <!-- Divider -->
  <div class="person-zone-divider"><span>En rango / Subutilizado</span></div>

  <!-- Ana Fer — underloaded -->
  <div class="person-lane person-lane--underloaded" style="--lane-idx:2">
    <button class="person-swimlane-toggle">
      <div class="person-status-strip">
        <div class="person-status-identity">
          <div class="plc-avatar-zone carga-avatar-ring carga-avatar-ring--underloaded">
            <img src="https://ui-avatars.com/api/?name=Ana+Fer&background=c38c47&color=fff&size=80" class="person-avatar" alt="Ana Fer"/>
