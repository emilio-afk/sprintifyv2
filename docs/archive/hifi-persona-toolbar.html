<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hi-Fi - Por Persona (Slim)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-page: #e8f1fb;
        --bg-card: #f7faff;
        --bg-control: #ffffff;
        --line: #c8d7eb;
        --text: #1f2f46;
        --muted: #5b6f8c;
        --primary: #1f5fe0;
        --primary-soft: #eaf1ff;
        --success: #0f8f57;
        --danger: #b64343;
        --radius-xl: 18px;
        --radius-lg: 12px;
        --radius-pill: 999px;
        --shadow-card: 0 12px 28px rgba(19, 42, 82, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Fira Sans", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #dbe8f7 0%, var(--bg-page) 100%);
        color: var(--text);
      }

      .frame {
        width: min(1500px, calc(100vw - 48px));
        margin: 42px auto;
      }

      .toolbar-card {
        background: var(--bg-card);
        border: 1px solid #c4d4ea;
        border-radius: 22px;
        box-shadow: var(--shadow-card);
        padding: 16px;
        position: relative;
      }

      .toolbar-main {
        display: grid;
        grid-template-columns: 250px 260px minmax(260px, 1fr) 220px auto auto;
        gap: 10px;
        align-items: center;
      }

      .label {
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        margin: 0 0 6px 6px;
      }

      .field {
        display: flex;
        flex-direction: column;
      }

      .control {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: var(--bg-control);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 0 12px;
        font-size: 17px;
        font-weight: 500;
        color: var(--text);
      }

      .control input {
        border: 0;
        outline: 0;
        width: 100%;
        font: inherit;
        color: var(--text);
        background: transparent;
      }

      .control input::placeholder {
        color: #8394ae;
      }

      .chev {
        width: 8px;
        height: 8px;
        border-right: 2px solid #607694;
        border-bottom: 2px solid #607694;
        transform: rotate(45deg) translateY(-1px);
        flex: 0 0 auto;
      }

      .segmented {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 3px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        min-height: 38px;
        background: #fff;
      }

      .segment {
        border: 0;
        border-radius: 10px;
        background: transparent;
        color: #556a88;
        font-family: inherit;
        font-weight: 700;
        font-size: 16px;
      }

      .segment.active {
        background: var(--primary);
        color: #fff;
      }

      .menu-btn,
      .ghost-btn {
        min-height: 38px;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 0 12px;
        background: #fff;
        color: #2f4463;
        font-family: inherit;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
      }

      .menu-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .badge {
        min-width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--primary-soft);
        color: var(--primary);
        font-size: 12px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .disclosure {
        margin-top: 10px;
        border: 1px dashed #c9d6e8;
        border-radius: 12px;
        background: #fbfdff;
      }

      .disclosure > summary {
        list-style: none;
        cursor: pointer;
        user-select: none;
        padding: 10px 12px;
        font-size: 14px;
        color: #4d6382;
        font-weight: 600;
      }

      .disclosure > summary::-webkit-details-marker {
        display: none;
      }

      .panel {
        padding: 0 12px 12px;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        min-height: 30px;
        border-radius: var(--radius-pill);
        border: 1px solid #c5d4e8;
        padding: 0 12px;
        background: #fff;
        color: #3f5572;
        font-size: 14px;
        font-weight: 600;
      }

      .chip.primary {
        background: var(--primary);
        border-color: transparent;
        color: #fff;
      }

      .chip.filter {
        background: #eef4ff;
        border-color: #d4e1f8;
      }

      .chip.clean {
        color: var(--danger);
        border-color: #e9c3c3;
        background: #fff6f6;
      }

      .context {
        margin-top: 10px;
        border-top: 1px solid #dbe5f2;
        padding-top: 10px;
        font-size: 15px;
        color: #415672;
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
      }

      .context strong {
        color: #2f4667;
      }

      .context .ok {
        color: var(--success);
        font-weight: 700;
      }

      .lanes {
        margin-top: 14px;
        border: 1px solid #cedcee;
        border-radius: 14px;
        background: #fff;
        min-height: 280px;
        display: grid;
        place-items: center;
        color: #8ba0bd;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: #7086a5;
      }

      .hint code {
        background: #eef3fb;
        padding: 1px 4px;
        border-radius: 4px;
      }

      @media (max-width: 1200px) {
        .toolbar-main {
          grid-template-columns: 1fr 1fr minmax(180px, 1fr) 200px;
        }

        .toolbar-main .actions {
          grid-column: 1 / -1;
          display: flex;
          gap: 10px;
        }
      }

      @media (max-width: 820px) {
        .frame {
          width: calc(100vw - 24px);
          margin: 20px auto;
        }

        .toolbar-card {
          padding: 12px;
          border-radius: 16px;
        }

        .toolbar-main {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .control,
        .menu-btn,
        .ghost-btn,
        .segmented {
          min-height: 34px;
          font-size: 15px;
        }

        .segment {
          font-size: 14px;
        }

        .actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <section class="toolbar-card">
        <div class="toolbar-main">
          <div class="field">
            <p class="label">Persona</p>
            <button class="control" type="button" aria-label="Seleccionar persona">
              <span>Todo el equipo</span>
              <span class="chev" aria-hidden="true"></span>
            </button>
          </div>

          <div class="field">
            <p class="label">Sprint</p>
            <button class="control" type="button" aria-label="Seleccionar sprint">
              <span>Activos</span>
              <span class="chev" aria-hidden="true"></span>
            </button>
          </div>

          <div class="field">
            <p class="label">Buscar</p>
            <label class="control" aria-label="Buscar persona">
              <input type="text" placeholder="Nombre o email" />
            </label>
          </div>

          <div class="field">
            <p class="label">Ver</p>
            <div class="segmented" role="tablist" aria-label="Cambiar vista">
              <button class="segment active" type="button">Actual</button>
              <button class="segment" type="button">Historico</button>
            </div>
          </div>

          <div class="actions" style="display: flex; gap: 10px; justify-content: flex-end">
            <button class="menu-btn" type="button">
              Filtros
              <span class="badge">2</span>
            </button>
            <button class="ghost-btn" type="button">Tabla</button>
          </div>
        </div>

        <details class="disclosure">
          <summary>Filtros y contexto (colapsable)</summary>
          <div class="panel">
            <div class="chip-row" aria-label="Filtros frecuentes">
              <button class="chip primary" type="button">Todos</button>
              <button class="chip" type="button">Sin avance</button>
              <button class="chip" type="button">Sobrecargados</button>
              <button class="chip filter" type="button">Sin asignar x</button>
              <button class="chip filter" type="button">Con carga viva x</button>
              <button class="chip clean" type="button">Limpiar</button>
            </div>

            <div class="context">
              <span><strong>02-03-2026 a 16-03-2026</strong></span>
              <span>Meta 40 pts</span>
              <span>Equipo 6</span>
              <span>Tareas 184</span>
              <span><strong>Carga viva 79 pts</strong></span>
              <span class="ok">Hecho 13 pts</span>
              <span>Act. 10:03</span>
            </div>
          </div>
        </details>

        <div class="lanes">CARRILES / GRID DE PERSONAS (NO MODIFICADO)</div>
        <p class="hint">
          Esta version es <code>no-sticky</code>: la barra permanece en flujo normal del layout.
        </p>
      </section>
    </main>
  </body>
</html>
